spring.application.name=foodfactory

# ========================
# DATABASE CONFIGURATION
# ========================
spring.datasource.url=jdbc:mysql://localhost:3306/food_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ========================
# JPA / HIBERNATE
# ========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ========================
# SERVER
# ========================
server.port=8080

# ========================
# SESSION COOKIE
# SameSite=Lax works with the CRA proxy (all requests appear same-origin on :3000)
# ========================
server.servlet.session.timeout=1d
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.secure=false
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.name=FOODAPP_SESSION
spring.session.store-type=jdbc
spring.session.jdbc.initialize-schema=always
spring.session.timeout=1d


# ========================
# JPA OPEN-IN-VIEW
# ========================
spring.jpa.open-in-view=false

# ========================
# MAIL
# ========================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=sriteja.a2103@gmail.com
spring.mail.password=fpkc bhmy tzqj uhlz
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ========================
# LOGGING
# ========================
logging.level.com.example.foodfactory=DEBUG
logging.level.org.springframework.security=DEBUG
logging.file.name=logs/food-app.log
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.console=%d{HH:mm:ss} %-5level %logger{36} - %msg%n
